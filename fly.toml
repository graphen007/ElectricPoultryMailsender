# fly.toml app configuration file generated for electric-poultry-mailsender on 2026-05-04T12:56:43+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'electric-poultry-mailsender'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_TLS_REJECT_UNAUTHORIZED = '0'
  PORT = '3001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
